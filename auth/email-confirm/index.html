<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email confirmado — Zplit</title>
  <link rel="stylesheet" href="../auth.css" />
</head>
<body class="auth-bg">
  <main class="auth-card">
    <img src="../zplit-mark.svg" alt="Zplit" class="auth-logo" />
    <h1>Email confirmado</h1>
    <p>Você já pode voltar ao app Zplit.</p>
    <a id="open-app-btn" class="btn-primary" href="#">Abrir o Zplit</a>
  </main>
  <script>
    const hash = window.location.hash || ''
    document.getElementById('open-app-btn').href =
      'io.supabase.appchurras://login-callback/' + hash
  </script>
</body>
</html>
